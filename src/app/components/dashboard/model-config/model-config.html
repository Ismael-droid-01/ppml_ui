<mat-card class="dashboard-card">
  <mat-card-header class="dashboard-header">
    <mat-card-title>Model Configuration</mat-card-title>
  </mat-card-header>

  <mat-card-content align="center">
    <div class="section-row center">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Select an algorithm</mat-label>
        <mat-select>
          <mat-option value="skmeans">SKmeans</mat-option>
          <mat-option value="logistic_regression">Logistic Regression</mat-option>
          <mat-option value="random_forest">Random Forest</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="parameters-grid">
      <mat-form-field appearance="fill">
        <mat-label>K</mat-label>
        <input matInput type="number" value="2">
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Max iterations</mat-label>
        <input matInput type="number" value="100">
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Param n</mat-label>
        <input matInput placeholder="X">
      </mat-form-field>

      <mat-form-field appearance="fill">
        <mat-label>Sensitivity</mat-label>
        <input matInput type="number" step="0.1" value="0.4">
      </mat-form-field>
    </div>

    <div class="dataset-actions">
    <mat-form-field appearance="outline" class="dataset-selector">
        <mat-label>Select a loaded dataset</mat-label>
        <mat-select [disabled]="uploadCheck.checked">
        <mat-option value="ds1">Customer_Data_v1.csv</mat-option>
        <mat-option value="ds2">Sales_Encrypted_2025.csv</mat-option>
        <mat-option value="ds3">Training_Set_Alpha.csv</mat-option>
        </mat-select>
        <mat-icon matSuffix>storage</mat-icon>
    </mat-form-field>

    <div class="upload-status">
        <mat-checkbox #uploadCheck color="primary" class="upload-checkbox">
            Upload a new dataset
        </mat-checkbox>
    </div>
    </div>

    <div class="drop-zone" *ngIf="uploadCheck.checked">
      <mat-icon>backup</mat-icon>
      <p>Drag a dataset here</p>
    </div>

    <div class="run-container">
      <button mat-raised-button color="primary" class="run-button">
        RUN
      </button>
    </div>
  </mat-card-content>
</mat-card>
